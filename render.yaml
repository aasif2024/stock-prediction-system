services:
  - type: web
    name: stocksense-api
    env: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash startup.sh
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: DATABASE_TYPE
        value: sqlite
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: CORS_ORIGINS
        value: http://localhost:3000,https://stock-prediction-system-seven.vercel.app
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        value: ""
      - key: SMTP_PASSWORD
        value: ""
      - key: SMTP_FROM_EMAIL
        value: noreply@stocksense.com
      - key: FRONTEND_URL
        value: https://stock-prediction-system-seven.vercel.app
